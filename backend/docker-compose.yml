services:
  db:
    image: postgis/postgis:16-3.4
    container_name: terraguard_db
    environment:
      POSTGRES_USER: terraguard
      POSTGRES_PASSWORD: terraguard_secret
      POSTGRES_DB: terraguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U terraguard -d terraguard"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - terraguard_network

  redis:
    image: redis:7-alpine
    container_name: terraguard_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - terraguard_network

volumes:
  postgres_data:
  redis_data:

networks:
  terraguard_network:
    driver: bridge
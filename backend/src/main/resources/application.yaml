spring:
  profiles:
    active: dev
  application:
    name: TerraGuard

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:terraguard}
    username: ${DB_USERNAME:terraguard}
    password: ${DB_PASSWORD:terraguard_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: true
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    # url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:terraguard}
    # user: ${DB_USERNAME:terraguard}
    # password: ${DB_PASSWORD:terraguard_secret}
  
  websocket:
    message-size-limit: 2048
    send-buffer-size-limit: 524288

server:
  port: 8080
  tomcat:
    threads:
      max: 50

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

# use lowercase only
terraguard:
  cors:
    allowed-origins:
      - http://localhost:5173
  highlight:
    keywords:
      - collapsed
      - trapped
      - casualties
      - evacuate
      - flooding
      - wildfire
      - magnitude
      - tsunami
      - explosion
      - blocked
      - injured
      - missing
      - destroyed
      - emergency
      - mayday